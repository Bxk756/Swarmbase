<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SwarmBase Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:
    radial-gradient(circle at top,
    rgba(0,123,255,0.2),
    transparent 35%),
    #050d18;

  color:white;
  font-family:Inter,sans-serif;
}

/* LAYOUT */

.layout{
  display:flex;
  min-height:100vh;
}

/* SIDEBAR */

.sidebar{
  width:260px;

  background:
    rgba(255,255,255,0.03);

  border-right:
    1px solid rgba(255,255,255,0.08);

  backdrop-filter:blur(18px);

  padding:25px;
}

.logo{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:40px;
}

.logo img{
  width:42px;
  height:42px;
  border-radius:12px;
}

.logo h2{
  font-size:28px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.menu a{
  text-decoration:none;
  color:white;
  padding:14px 18px;
  border-radius:12px;
  opacity:0.8;
  transition:0.25s;
}

.menu a:hover{
  background:
    rgba(0,123,255,0.18);

  opacity:1;
}

.active{
  background:
    linear-gradient(
      135deg,
      #00d4ff,
      #0066ff
    );

  opacity:1;
}

/* MAIN */

.main{
  flex:1;
  padding:30px;
}

/* TOPBAR */

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.topbar h1{
  font-size:42px;
}

.plan{
  background:
    linear-gradient(
      135deg,
      #00d4ff,
      #0066ff
    );

  padding:10px 18px;
  border-radius:30px;
  font-size:14px;
}

/* METRICS */

.metrics{
  display:grid;
  grid-template-columns:
    repeat(auto-fit,minmax(240px,1fr));

  gap:20px;
  margin-bottom:25px;
}

.card{
  background:
    rgba(255,255,255,0.04);

  border:
    1px solid rgba(255,255,255,0.08);

  border-radius:18px;

  padding:24px;

  backdrop-filter:blur(18px);

  box-shadow:
    0 0 30px rgba(0,123,255,0.12);
}

.card h3{
  opacity:0.7;
  margin-bottom:10px;
}

.metric{
  font-size:44px;
  font-weight:bold;
}

/* CONTENT GRID */

.content{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:24px;
  margin-top:20px;
}

/* CHARTS */

.chart-card{
  height:340px;
}

canvas{
  margin-top:20px;
}

/* FINDINGS */

.findings{
  display:flex;
  flex-direction:column;
  gap:15px;
}

.finding{
  background:
    rgba(255,255,255,0.04);

  border-radius:12px;
  padding:18px;
}

.finding-top{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.severity{
  padding:5px 10px;
  border-radius:6px;
  font-size:12px;
}

.high{
  background:rgba(255,0,0,0.2);
  color:#ff7b7b;
}

.medium{
  background:rgba(255,165,0,0.2);
  color:orange;
}

.low{
  background:rgba(0,255,150,0.2);
  color:#00ffae;
}

/* ACTIVITY */

.activity{
  margin-top:24px;
}

.activity-item{
  padding:14px;
  border-radius:10px;
  background:
    rgba(255,255,255,0.04);

  margin-top:10px;
}

/* THREAT MAP */

.map{
  position:relative;
  height:320px;
  overflow:hidden;
}

.map::before{
  content:"";
  position:absolute;
  inset:0;

  background:
    radial-gradient(
      circle,
      #00d4ff 2px,
      transparent 2px
    );

  background-size:80px 80px;
  opacity:0.1;
}

.center-node{
  position:absolute;
  top:50%;
  left:50%;

  width:140px;
  height:140px;

  transform:translate(-50%,-50%);

  border-radius:50%;

  background:
    radial-gradient(
      circle,
      #00d4ff,
      transparent
    );

  box-shadow:
    0 0 60px #00d4ff;
}

.node{
  position:absolute;

  width:12px;
  height:12px;

  background:#00d4ff;

  border-radius:50%;

  box-shadow:
    0 0 20px #00d4ff;

  animation:pulse 2s infinite;
}

.node:nth-child(2){
  top:20%;
  left:25%;
}

.node:nth-child(3){
  top:70%;
  left:70%;
}

.node:nth-child(4){
  top:30%;
  left:80%;
}

.node:nth-child(5){
  top:75%;
  left:20%;
}

/* ANIM */

@keyframes pulse{

  0%{
    transform:scale(1);
    opacity:0.6;
  }

  50%{
    transform:scale(1.5);
    opacity:1;
  }

  100%{
    transform:scale(1);
    opacity:0.6;
  }

}

/* MOBILE */

@media(max-width:1000px){

  .content{
    grid-template-columns:1fr;
  }

  .sidebar{
    display:none;
  }

}

</style>
</head>

<body>

<div class="layout">

  <!-- SIDEBAR -->

  <div class="sidebar">

    <div class="logo">
      <img src="/logo.png">
      <h2>SwarmBase</h2>
    </div>

    <div class="menu">

      <a class="active" href="#">
        Dashboard
      </a>

      <a href="#">
        Targets
      </a>

      <a href="#">
        Findings
      </a>

      <a href="#">
        Threat Intel
      </a>

      <a href="#">
        Reports
      </a>

      <a href="#">
        Billing
      </a>

      <a href="#">
        Settings
      </a>

    </div>

  </div>

  <!-- MAIN -->

  <div class="main">

    <!-- TOPBAR -->

    <div class="topbar">

      <h1>
        Cyber Intelligence Dashboard
      </h1>

      <div class="plan">
        PRO PLAN
      </div>

    </div>

    <!-- METRICS -->

    <div class="metrics">

      <div class="card">

        <h3>Risk Score</h3>

        <div class="metric" id="riskScore">
          --
        </div>

      </div>

      <div class="card">

        <h3>Open Findings</h3>

        <div class="metric" id="openFindings">
          --
        </div>

      </div>

      <div class="card">

        <h3>Resolved Findings</h3>

        <div class="metric" id="resolvedFindings">
          --
        </div>

      </div>

      <div class="card">

        <h3>Protected Targets</h3>

        <div class="metric" id="targets">
          --
        </div>

      </div>

    </div>

    <!-- CONTENT -->

    <div class="content">

      <!-- LEFT -->

      <div>

        <!-- TREND CHART -->

        <div class="card chart-card">

          <h2>
            Risk Trend
          </h2>

          <canvas id="riskChart"></canvas>

        </div>

        <!-- THREAT MAP -->

        <div class="card map" style="margin-top:24px;">

          <h2>
            Live Threat Activity
          </h2>

          <div class="center-node"></div>

          <div class="node"></div>
          <div class="node"></div>
          <div class="node"></div>
          <div class="node"></div>

        </div>

      </div>

      <!-- RIGHT -->

      <div>

        <!-- SEVERITY -->

        <div class="card">

          <h2>
            Severity Breakdown
          </h2>

          <canvas id="severityChart"></canvas>

        </div>

        <!-- RECENT FINDINGS -->

        <div class="card activity">

          <h2>
            Recent Findings
          </h2>

          <div id="findings"></div>

        </div>

      </div>

    </div>

  </div>

</div>

<script>

const token = localStorage.getItem("token")

async function loadDashboard(){

  try{

    const res = await fetch(
      "/risk/intelligence",
      {
        headers:{
          Authorization:
            "Bearer " + token
        }
      }
    )

    const data = await res.json()

    // METRICS

    document.getElementById("riskScore")
      .innerText = data.riskScore

    document.getElementById("openFindings")
      .innerText = data.openFindings

    document.getElementById("resolvedFindings")
      .innerText = data.resolvedFindings

    document.getElementById("targets")
      .innerText = data.targets

    // FINDINGS

    const findingsDiv =
      document.getElementById("findings")

    findingsDiv.innerHTML = ""

    data.recentFindings.forEach(f => {

      const div =
        document.createElement("div")

      div.className = "activity-item"

      div.innerHTML = `
        <div class="finding-top">

          <strong>
            ${f.title}
          </strong>

          <div class="
            severity
            ${f.severity}
          ">
            ${f.severity.toUpperCase()}
          </div>

        </div>

        <div style="
          opacity:0.7;
          margin-top:8px;
        ">
          ${f.description}
        </div>
      `

      findingsDiv.appendChild(div)

    })

    // RISK CHART

    new Chart(
      document.getElementById("riskChart"),
      {

        type:"line",

        data:{

          labels:[
            "Mon",
            "Tue",
            "Wed",
            "Thu",
            "Fri",
            "Sat",
            "Sun"
          ],

          datasets:[{

            label:"Risk Score",

            data:[
              91,
              84,
              82,
              78,
              75,
              73,
              data.riskScore
            ],

            borderColor:"#00d4ff",

            backgroundColor:
              "rgba(0,212,255,0.15)",

            fill:true,

            tension:0.4

          }]

        }

      }
    )

    // SEVERITY CHART

    new Chart(
      document.getElementById("severityChart"),
      {

        type:"doughnut",

        data:{

          labels:[
            "High",
            "Medium",
            "Low"
          ],

          datasets:[{

            data:[

              data.severityBreakdown.high,

              data.severityBreakdown.medium,

              data.severityBreakdown.low

            ],

            backgroundColor:[
              "#ff4d4d",
              "#ffaa00",
              "#00ffaa"
            ]

          }]

        }

      }
    )

  }catch(err){

    console.error(err)

  }

}

loadDashboard()

</script>

</body>
</html>
