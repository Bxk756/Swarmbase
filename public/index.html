<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SwarmBase — AI Cybersecurity</title>

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0b1b2b, #050b14);
  color: white;
}

/* NAV */
nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 40px;
}

.btn {
  padding: 10px 20px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.2);
  background: transparent;
  color: white;
  cursor: pointer;
}

/* HERO */
.hero {
  text-align: center;
  padding: 80px 20px;
}

.hero h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

.hero p {
  color: #aaa;
}

.cta {
  margin-top: 30px;
}

.cta a {
  margin: 10px;
  text-decoration: none;
}

.primary {
  background: linear-gradient(135deg, #00f0ff, #0066ff);
  border: none;
}

.secondary {
  background: transparent;
}

/* STATS */
.stats {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin-top: 40px;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  width: 150px;
}

/* DASHBOARD PREVIEW */
.preview {
  margin-top: 80px;
  padding: 40px;
  text-align: center;
}

.preview img {
  width: 90%;
  border-radius: 15px;
  box-shadow: 0 0 40px rgba(0,200,255,0.2);
  transition: 0.3s;
}

.preview img:hover {
  transform: scale(1.02);
}

/* CTA BOTTOM */
.bottom-cta {
  text-align: center;
  margin: 80px 0;
}

.bottom-cta a {
  text-decoration: none;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">
    <img src="/logo.png"/>
    <h2>SwarmBase</h2>
  </div>

  <a href="/login.html">
    <button class="btn">Login</button>
  </a>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Next-Gen Cybersecurity</h1>
  <p>AI-powered threat detection, real-time scanning, and risk intelligence</p>

  <div class="cta">
    <a href="/signup.html">
      <button class="btn primary">Start Free Trial</button>
    </a>

    <a href="/login.html">
      <button class="btn secondary">Login</button>
    </a>
  </div>

  <div class="stats">
    <div class="card">
      <h2>100</h2>
      <p>Performance</p>
    </div>
    <div class="card">
      <h2>73</h2>
      <p>Risk Score</p>
    </div>
    <div class="card">
      <h2>90</h2>
      <p>Security</p>
    </div>
  </div>
</section>

<!-- 🔥 DASHBOARD PREVIEW (THIS IS WHAT YOU WERE MISSING) -->
<section class="preview">
  <h2>Real-Time Threat Intelligence</h2>
  <p style="color:#aaa;">Monitor, scan, and secure your systems in one place</p>

  <!-- You can replace this with a screenshot later -->
  <img src="/dashboard-preview.png" alt="Dashboard Preview"/>
</section>

<!-- CTA -->
<section class="bottom-cta">
  <h2>Start Securing Your Infrastructure Today</h2>

  <a href="/signup.html">
    <button class="btn primary">Create Account</button>
  </a>
</section>

</body>
</html>
