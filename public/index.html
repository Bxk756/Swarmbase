<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwarmBase — AI Cybersecurity Platform</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: radial-gradient(circle at top, #0b1a2a, #050b18);
      color: white;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      align-items: center;
    }

    .logo {
      font-weight: 700;
      font-size: 20px;
      color: #00d4ff;
    }

    .btn {
      background: linear-gradient(135deg, #00d4ff, #007bff);
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      color: white;
      font-weight: 600;
    }

    .hero {
      text-align: center;
      margin-top: 120px;
    }

    .hero h1 {
      font-size: 48px;
      margin-bottom: 20px;
    }

    .hero p {
      color: #aaa;
      margin-bottom: 30px;
    }

    .cta {
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    .secondary {
      border: 1px solid #00d4ff;
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      color: #00d4ff;
    }
  </style>
</head>

<body>

  <div class="nav">
    <div class="logo">SwarmBase</div>
    <div>
      <a href="/login" class="secondary">Login</a>
      <a href="/dashboard.html" class="btn">Dashboard</a>
    </div>
  </div>

  <div class="hero">
    <h1>Next-Gen Cybersecurity<br>for a Zero-Trust World</h1>
    <p>AI-driven threat detection, real-time scanning, and swarm intelligence</p>

    <div class="cta">
      <a href="/login" class="btn">Get Started</a>
      <a href="/dashboard.html" class="secondary">View Demo</a>
    </div>
  </div>

</body>
</html>
