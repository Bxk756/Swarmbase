<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SwarmBase</title>
<link rel="stylesheet" href="components.css">
<style>
.hero {
  text-align: center;
  margin-top: 80px;
}

.scan-box {
  margin-top: 30px;
}

input {
  padding: 12px;
  border-radius: 8px;
  border: none;
  width: 250px;
}

.preview {
  margin-top: 80px;
  text-align: center;
}

.preview img {
  width: 90%;
  max-width: 900px;
  border-radius: 12px;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo">
    <img src="/logo.png">
    <strong>SwarmBase</strong>
  </div>

  <div>
    <a href="/about.html">About</a>
    <a href="/login.html">Login</a>
    <a href="/signup.html">Start Free Trial</a>
  </div>
</div>

<div class="hero">
  <h1>Next-Gen Cybersecurity</h1>
  <p>Scan your domain instantly</p>

  <div class="scan-box">
    <input id="domain" placeholder="example.com">
    <button class="btn" onclick="scan()">Scan</button>
  </div>

  <div id="result" style="margin-top:20px;"></div>
</div>

<div class="preview">
  <h2>Dashboard Preview</h2>
  <img src="/dashboard-preview.png">
</div>

<div class="footer">
  © 2026 Swarm Shield LLC
  <br>
  <a href="/privacy.html">Privacy</a>
  <a href="/terms.html">Terms</a>
</div>

<script>
async function scan() {
  const domain = document.getElementById("domain").value
  const res = await fetch("/scan", {
    method:"POST",
    headers:{ "Content-Type":"application/json"},
    body: JSON.stringify({ domain })
  })

  const data = await res.json()
  document.getElementById("result").innerText =
    "Score: " + data.score
}
</script>

</body>
</html>
