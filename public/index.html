<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SwarmBase — AI Cybersecurity</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: radial-gradient(circle at top, #0f2a44, #071426);
  color: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  align-items: center;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo img {
  width: 40px;
}

.nav a {
  margin-left: 12px;
  text-decoration: none;
  padding: 8px 14px;
  border-radius: 8px;
  color: white;
  border: 1px solid rgba(255,255,255,0.2);
}

.nav .primary {
  background: linear-gradient(135deg,#00d4ff,#007bff);
  border: none;
}

/* HERO */
.hero {
  text-align: center;
  margin-top: 80px;
  padding: 20px;
}

.hero h1 {
  font-size: 42px;
  margin-bottom: 12px;
}

.hero p {
  opacity: 0.7;
  margin-bottom: 30px;
}

/* SCAN BOX */
.scan-box {
  margin-top: 30px;
}

.scan-input {
  display: flex;
  justify-content: center;
  gap: 10px;
}

.scan-input input {
  width: 300px;
  padding: 14px;
  border-radius: 10px;
  border: none;
}

.scan-input button {
  padding: 14px 18px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg,#00d4ff,#007bff);
  color: white;
  font-weight: bold;
  cursor: pointer;
}

/* LOADING */
.loading {
  margin-top: 20px;
  display: none;
  font-size: 14px;
  opacity: 0.8;
}

.loading span {
  display: block;
  margin-top: 4px;
}

/* RESULTS */
.results {
  display: none;
  margin-top: 30px;
  animation: fadeIn 0.5s ease;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 14px;
  max-width: 400px;
  margin: auto;
  backdrop-filter: blur(10px);
}

.score {
  font-size: 30px;
  color: #00ffcc;
  margin-bottom: 10px;
}

.issue {
  font-size: 14px;
  margin: 6px 0;
}

.impact {
  margin-top: 10px;
  color: #00d4ff;
  font-weight: bold;
}

.cta-upgrade {
  margin-top: 15px;
}

.cta-upgrade a {
  background: linear-gradient(135deg,#00d4ff,#007bff);
  padding: 10px 14px;
  border-radius: 8px;
  text-decoration: none;
  color: white;
}

/* DASHBOARD PREVIEW */
.preview {
  margin-top: 100px;
  text-align: center;
}

.preview h2 {
  margin-bottom: 20px;
}

.preview img {
  width: 90%;
  max-width: 900px;
  border-radius: 12px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
}

/* ANIM */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="/logo.png" />
    <h2>SwarmBase</h2>
  </div>

  <div class="nav">
    <a href="/login.html">Login</a>
    <a href="/signup.html" class="primary">Start Free Trial</a>
  </div>
</header>

<section class="hero">
  <h1>Next-Gen Cybersecurity</h1>
  <p>AI-powered threat detection, real-time scanning, and risk intelligence</p>

  <div class="scan-box">

    <div class="scan-input">
      <input id="domainInput" placeholder="Enter your domain (example.com)">
      <button id="scanBtn" onclick="runScan()">Scan Now</button>
    </div>

    <div class="loading" id="loading">
      <span id="step1">🔍 Scanning domain...</span>
      <span id="step2">🛡️ Checking security headers...</span>
      <span id="step3">⚠️ Analyzing vulnerabilities...</span>
    </div>

    <div class="results" id="results">
      <div class="card">
        <div class="score" id="score">--</div>
        <div id="issues"></div>
        <div class="impact" id="impact"></div>

        <div class="cta-upgrade">
          <a href="/signup.html">Unlock Full Report</a>
        </div>
      </div>
    </div>

  </div>
</section>

<section class="preview">
  <h2>Dashboard Preview</h2>
  <img src="/dashboard-preview.png" alt="Dashboard Preview">
</section>

<script>
async function runScan() {
  const domain = document.getElementById("domainInput").value;
  const btn = document.getElementById("scanBtn");

  if (!domain) {
    alert("Enter a domain");
    return;
  }

  btn.disabled = true;
  btn.innerText = "Scanning...";

  document.getElementById("loading").style.display = "block";
  document.getElementById("results").style.display = "none";

  // fake step animation
  setTimeout(() => {
    document.getElementById("step2").style.opacity = "1";
  }, 800);

  setTimeout(() => {
    document.getElementById("step3").style.opacity = "1";
  }, 1600);

  try {
    const res = await fetch("/scan", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ domain })
    });

    const data = await res.json();

    document.getElementById("loading").style.display = "none";
    document.getElementById("results").style.display = "block";

    const score = data.score || Math.floor(Math.random()*40)+60;

    document.getElementById("score").innerText = "Risk Score: " + score;

    const issuesEl = document.getElementById("issues");
    issuesEl.innerHTML = "";

    const findings = data.findings || [
      { title: "Missing Security Headers" },
      { title: "X-Frame-Options not set" },
      { title: "Server exposes version info" }
    ];

    findings.slice(0,3).forEach(f => {
      const div = document.createElement("div");
      div.className = "issue";
      div.innerText = "⚠ " + f.title;
      issuesEl.appendChild(div);
    });

    document.getElementById("impact").innerText =
      "+ " + Math.floor(Math.random()*30+10) + " score improvement if fixed";

  } catch (err) {
    alert("Scan failed");
  }

  btn.disabled = false;
  btn.innerText = "Scan Now";
}
</script>

</body>
</html>
