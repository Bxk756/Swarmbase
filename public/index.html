<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SwarmBase — AI Cybersecurity</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #0f2a44, #071426);
      color: white;
      min-height: 100vh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo img {
      width: 40px;
    }

    .logo h1 {
      font-size: 20px;
    }

    .nav-buttons a {
      margin-left: 10px;
      text-decoration: none;
      color: white;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
    }

    .nav-buttons a.primary {
      background: linear-gradient(135deg, #00d4ff, #007bff);
      border: none;
    }

    .hero {
      text-align: center;
      margin-top: 80px;
      padding: 20px;
    }

    .hero h2 {
      font-size: 40px;
      margin-bottom: 15px;
    }

    .hero p {
      opacity: 0.7;
      margin-bottom: 40px;
    }

    .cta-buttons a {
      margin: 0 10px;
      text-decoration: none;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 600;
    }

    .primary-btn {
      background: linear-gradient(135deg, #00d4ff, #007bff);
      color: white;
    }

    .secondary-btn {
      border: 1px solid rgba(255,255,255,0.3);
      color: white;
    }

    /* SCAN BOX */
    .scan-box {
      margin-top: 50px;
    }

    .scan-input {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .scan-input input {
      padding: 14px;
      width: 300px;
      border-radius: 10px;
      border: none;
      outline: none;
      font-size: 16px;
    }

    .scan-input button {
      padding: 14px 20px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #00d4ff, #007bff);
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    /* RESULTS */
    .results {
      margin-top: 30px;
      display: none;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 20px;
      margin: 10px auto;
      max-width: 400px;
      text-align: left;
      backdrop-filter: blur(10px);
    }

    .score {
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #00ffcc;
    }

    .issue {
      margin: 6px 0;
      font-size: 14px;
      opacity: 0.8;
    }

    .loading {
      margin-top: 20px;
      display: none;
    }

    .upgrade {
      margin-top: 20px;
    }

    .upgrade a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: 8px;
      background: linear-gradient(135deg, #00d4ff, #007bff);
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

  </style>
</head>
<body>

<header>
  <div class="logo">
    <img src="/logo.png" />
    <h1>SwarmBase</h1>
  </div>

  <div class="nav-buttons">
    <a href="/login.html">Login</a>
    <a href="/signup.html" class="primary">Start Free Trial</a>
  </div>
</header>

<section class="hero">
  <h2>Next-Gen Cybersecurity</h2>
  <p>AI-powered threat detection, real-time scanning, and risk intelligence</p>

  <div class="cta-buttons">
    <a href="/signup.html" class="primary-btn">Start Free Trial</a>
    <a href="/login.html" class="secondary-btn">Login</a>
  </div>

  <!-- SCAN FEATURE -->
  <div class="scan-box">

    <div class="scan-input">
      <input id="domainInput" placeholder="Enter your domain (example.com)" />
      <button onclick="runScan()">Scan Now</button>
    </div>

    <div class="loading" id="loading">
      Scanning...
    </div>

    <div class="results" id="results">
      <div class="card">
        <div class="score" id="score">--</div>
        <div id="issues"></div>
      </div>

      <div class="upgrade">
        <p>Unlock full report, fix recommendations, and monitoring</p>
        <a href="/signup.html">Start Free Trial</a>
      </div>
    </div>

  </div>
</section>

<script>
async function runScan() {
  const domain = document.getElementById("domainInput").value;

  if (!domain) {
    alert("Enter a domain");
    return;
  }

  document.getElementById("loading").style.display = "block";
  document.getElementById("results").style.display = "none";

  try {
    const res = await fetch("/scan", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ domain })
    });

    const data = await res.json();

    document.getElementById("loading").style.display = "none";
    document.getElementById("results").style.display = "block";

    document.getElementById("score").innerText =
      "Risk Score: " + (data.score || 72);

    const issuesEl = document.getElementById("issues");
    issuesEl.innerHTML = "";

    if (data.findings && data.findings.length > 0) {
      data.findings.slice(0, 3).forEach(f => {
        const div = document.createElement("div");
        div.className = "issue";
        div.innerText = "• " + f.title;
        issuesEl.appendChild(div);
      });
    } else {
      issuesEl.innerHTML = "<div class='issue'>• Missing security headers</div>";
    }

  } catch (err) {
    document.getElementById("loading").style.display = "none";
    alert("Scan failed");
  }
}
</script>

</body>
</html>
