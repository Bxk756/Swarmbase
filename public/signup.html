<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — SwarmBase</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: radial-gradient(circle at top, #0b1220, #05070d);
      color: white;
      overflow: hidden;
    }

    /* BACKGROUND GLOW */
    .bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,198,255,0.2), transparent);
      filter: blur(120px);
      top: -100px;
      left: -100px;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .logo {
      width: 80px;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    .card {
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(20px);
      padding: 30px;
      border-radius: 16px;
      width: 360px;
      box-shadow: 0 0 50px rgba(0, 140, 255, 0.2);
      border: 1px solid rgba(255,255,255,0.05);
    }

    h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 8px;
      border: none;
      background: #020617;
      color: white;
      outline: none;
    }

    input::placeholder {
      color: #94a3b8;
    }

    .plans {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 15px 0;
    }

    .plan {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #1e293b;
      cursor: pointer;
      transition: 0.3s;
    }

    .plan:hover {
      transform: scale(1.02);
    }

    .plan.active {
      border: 1px solid #00c6ff;
      background: rgba(0, 198, 255, 0.1);
      box-shadow: 0 0 20px rgba(0,198,255,0.2);
    }

    .plan h4 {
      margin: 0;
    }

    .plan p {
      margin: 5px 0 0;
      font-size: 12px;
      opacity: 0.7;
    }

    button {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      color: white;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 20px rgba(0,198,255,0.4);
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      font-size: 13px;
    }

    a {
      color: #00c6ff;
      text-decoration: none;
    }
  </style>
</head>

<body>

<div class="bg-glow"></div>

<div class="container">

  <!-- LOGO -->
  <img src="/logo.png" class="logo" />

  <div class="card">

    <h2>Create Account</h2>

    <input type="text" id="name" placeholder="Full Name" />
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />

    <!-- PLANS -->
    <div class="plans">

      <div class="plan active" data-plan="free">
        <h4>Free Trial</h4>
        <p>Limited scans • Basic insights</p>
      </div>

      <div class="plan" data-plan="pro">
        <h4>Pro</h4>
        <p>Advanced scanning • Full risk engine</p>
      </div>

      <div class="plan" data-plan="enterprise">
        <h4>Enterprise</h4>
        <p>Unlimited • Team access • Priority support</p>
      </div>

    </div>

    <button onclick="signup()">Start Free Trial</button>

    <div class="footer">
      Already have an account?
      <a href="/login.html">Login</a>
    </div>

  </div>

</div>

<script>
  let selectedPlan = "free"

  document.querySelectorAll(".plan").forEach(el => {
    el.addEventListener("click", () => {
      document.querySelectorAll(".plan").forEach(p => p.classList.remove("active"))
      el.classList.add("active")
      selectedPlan = el.dataset.plan
    })
  })

  async function signup() {
    const name = document.getElementById("name").value
    const email = document.getElementById("email").value
    const password = document.getElementById("password").value

    if (!name || !email || !password) {
      alert("Please fill all fields")
      return
    }

    try {
      const res = await fetch("/auth/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          name,
          email,
          password,
          plan: selectedPlan
        })
      })

      const data = await res.json()

      if (res.ok) {
        alert("Account created!")
        window.location.href = "/login.html"
      } else {
        alert(data.error || "Signup failed")
      }

    } catch (err) {
      alert("Server error")
    }
  }
</script>

</body>
</html>
